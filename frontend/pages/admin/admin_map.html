<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Bản đồ - HVNH Digital Map</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/admin-style.css">
    <link rel="stylesheet" href="../../css/pages/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="admin-main-wrapper">
        <main class="admin-container">
            <div class="admin-content-box">
                <div class="admin-tabs">
            <a href="admin_map.html" class="tab-item active"><i class="fas fa-map-marked-alt"></i> Bản đồ</a>
            <a href="admin_tintuc.html" class="tab-item"><i class="fas fa-newspaper"></i> Tin tức</a>
            <a href="admin_hd.html" class="tab-item"><i class="fas fa-calendar-check"></i> Hoạt động</a>
        </div>
        <div class="admin-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2><i class="fas fa-map-marked-alt"></i> QUẢN LÝ DANH SÁCH ĐỊA ĐIỂM</h2>
                    <p>Quản lý thông tin hiển thị và trạng thái tìm kiếm của các địa điểm trên bản đồ.</p>
                </div>
                <button class="btn-add" onclick="openAddModal()"
                    style="background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;">
                    <i class="fas fa-plus"></i> Thêm địa điểm mới
                </button>
            </div>
        </div>
        <div class="search-container" style="position: relative; max-width: 400px; margin-bottom: 20px;">
            <div style="position: relative;">
                <i class="fas fa-search"
                    style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888;"></i>
                <input type="text" id="adminSearchInput" placeholder="Tìm kiếm theo mã, tên địa điểm hoặc tòa nhà..."
                    style="width: 100%; padding: 12px 15px 12px 40px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;">
            </div>
            <ul id="adminSearchResults"
                style="display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; border: 1px solid #ccc; border-radius: 6px; list-style: none; padding: 0; margin: 5px 0 0; max-height: 250px; overflow-y: auto; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            </ul>
        </div>
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID (Code)</th>
                        <th>Tòa nhà</th>
                        <th>Địa điểm</th>
                        <th>Tầng</th>
                        <th>Mô tả</th>
                        <th width="180">Hiện ở tìm kiếm</th>
                        <th width="100">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="location-table-body">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">Đang tải dữ liệu...</td>
                    </tr>
                </tbody>
            </table>
        </div>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="admin-modal"
        style="display:none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="modal-content"
            style="background: white; padding: 30px; border-radius: 8px; width: 500px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;">
            <h3 style="margin-top: 0; color: #003478;">Thông tin địa điểm</h3>

            <form onsubmit="saveLocation(event)">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Tòa nhà:</label>
                    <select id="edit-building" required
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                        <option value="">-- Chọn tòa nhà --</option>
                    </select>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Node ID tương ứng:</label>
                    <input type="text" id="edit-node-id" readonly
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; color: #333;"
                        placeholder="Tự động điền theo tòa nhà">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Mã địa điểm (ID Code):</label>
                    <input type="text" id="edit-location-code" required
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
                        placeholder="VD: 1_3 (Sẽ tự gợi ý số tiếp theo)">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Vị trí cụ thể:</label>
                    <input type="text" id="edit-specific-location"
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
                        placeholder="VD: Phòng học 101">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Tầng:</label>
                    <input type="text" id="edit-floor"
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"
                        placeholder="VD: 1">
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Mô tả:</label>
                    <textarea id="edit-description"
                        style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; height: 80px; font-family: inherit;"
                        placeholder="Nhập mô tả địa điểm..."></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Ảnh địa điểm:</label>
                    <div id="image-drop-zone"
                        style="border: 2px dashed #ccc; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; background: #f9f9f9; transition: 0.3s;">
                        <i class="fas fa-image" style="font-size: 24px; color: #888; margin-bottom: 8px;"></i>
                        <p style="margin: 0; font-size: 13px; color: #666;">Kéo thả ảnh vào đây hoặc click để chọn</p>
                        <input type="file" id="edit-image-input" accept="image/*" style="display: none;">
                    </div>
                    <div id="image-preview-container"
                        style="margin-top: 10px; display: none; position: relative; text-align: center;">
                        <img id="image-preview" src=""
                            style="max-width: 100%; max-height: 150px; border-radius: 4px; border: 1px solid #ddd;">
                        <button type="button" onclick="removeSelectedImage()"
                            style="display: block; margin: 5px auto; color: #e74c3c; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: bold;"><i
                                class="fas fa-times"></i> Hủy ảnh này</button>
                    </div>
                </div>

                <div class="modal-actions"
                    style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" id="btn-delete-location" onclick="deleteLocation()"
                        style="display:none; padding: 10px 20px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-right: auto;">Xóa
                        địa điểm</button>
                    <button type="button" onclick="closeEditModal()"
                        style="padding: 10px 20px; border: 1px solid #ccc; background: #eee; cursor: pointer; border-radius: 4px; font-weight: bold;">Hủy</button>
                    <button type="submit" class="btn-save"
                        style="padding: 10px 20px; background: #003478; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">Lưu
                        dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/controllers/admin/admin-map.js"></script>
    <script>
        // Các logic khởi tạo nhanh
        loadHeader('../..', 'admin');
        loadFooter('../..');
        const currentUser = getCurrentUser();
        if (!currentUser || currentUser.acc_type !== 'admin_web') {
            window.location.href = '../dangnhap.html';
        }
    </script>
</body>

</html>
