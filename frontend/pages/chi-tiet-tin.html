<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết tin tức - Học viện Ngân hàng</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages/tin-tuc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>

<body>
    <div class="main-content-wrapper">
        
        <div class="container">
            <!-- Loading State -->
            <div id="loading-container" class="loading-state" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...
            </div>

            <!-- Error State -->
            <div id="error-container" class="error-state" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <p id="error-message">Không thể tải tin tức. Vui lòng quay lại sau.</p>
                <a href="tin-tuc.html" class="btn-back">Quay lại danh sách</a>
            </div>

            <!-- News Detail -->
            <article id="news-detail" class="news-detail-article" style="display: none;">
                <!-- Article Header -->
                <header class="article-header">
                    <h1 id="article-title">Tiêu đề tin tức</h1>
                    
                    <div class="article-meta">
                        <span class="article-date">
                            <i class="far fa-calendar-alt"></i>
                            <span id="article-date">27/02/2026</span>
                        </span>
                        <span class="article-category" id="article-category-span" style="display: none;">
                            <i class="fas fa-tag"></i>
                            <span id="article-category">Tin tức</span>
                        </span>
                    </div>

                    <!-- Featured Image -->
                    <div class="article-featured-image">
                        <img id="article-featured-image" src="" alt="Hình ảnh tin tức" onerror="this.src='https://via.placeholder.com/1200x400/003478/fff'">
                    </div>
                </header>

                <!-- Article Content -->
                <div class="article-content">
                    <div id="article-body">
                        <!-- Content blocks will be loaded here -->
                    </div>
                </div>

                <!-- Article Footer -->
                <footer class="article-footer">
                    <div class="article-actions">
                        <a href="tin-tuc.html" class="btn-back">
                            <i class="fas fa-arrow-left"></i> Quay lại danh sách
                        </a>
                    </div>
                </footer>
            </article>

            <!-- Related News Section -->
            <section id="related-news-section" class="related-news-section" style="display: none;">
                <h2>Tin tức liên quan</h2>
                <div id="related-news-container" class="news-grid">
                    <!-- Related news will be loaded here -->
                </div>
            </section>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../js/common.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/controllers/tin-tuc.js"></script>
    <script>
        // Call the main function to load news detail
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader('..', 'tin-tuc');
            loadFooter('..', 'tin-tuc');
            loadNewsDetail();
        });
    </script>
</body>

</html>
