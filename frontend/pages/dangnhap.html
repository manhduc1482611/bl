<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVNH Map - Đăng nhập</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .login-page { min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center; padding: 60px 0; background: #f4f7f6; }
        .login-card { width: min(460px, 90%); background: #fff; border-radius: 18px; padding: 42px 36px; box-shadow: 0 14px 40px rgba(0,0,0,0.08); }
        .login-card h2 { margin: 0 0 24px; font-size: 28px; color: #003478; text-align: center; }
        .login-card label { display: block; margin-bottom: 8px; font-weight: 700; color: #333; }
        .login-card input { width: 100%; padding: 14px 16px; border: 1px solid #d2d8e0; border-radius: 10px; margin-bottom: 18px; font-size: 15px; }
        .login-card button { width: 100%; background: #003478; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; }
        .login-card button:hover { background: #0d2c63; transform: translateY(-1px); }
        .login-error { min-height: 22px; color: #d93025; margin-top: 8px; text-align: center; font-size: 0.95rem; }
    </style>
</head>
<body>
    <script src="../js/common.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/controllers/dangnhap.js"></script>

    <div class="login-page">
        <div class="login-card">
            <h2>Đăng nhập Admin</h2>
            <form id="login-form">
                <label for="username">Tài khoản</label>
                <input type="text" id="username" name="username" placeholder="Nhập tài khoản" autocomplete="username" required>
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
                <button type="submit">Đăng nhập</button>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
    </div>

    <script>
        loadHeader('..', 'dangnhap');
        loadFooter('..');
    </script>
</body>
</html>
