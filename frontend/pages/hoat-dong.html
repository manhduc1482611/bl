<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoạt động - Học viện Ngân hàng</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages/hoat-dong.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>

<body>
    <div class="main-content-wrapper">
        
        <div class="container">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a href="../../trang-chu.html"><i class="fas fa-home"></i> Trang chủ</a>
                <span>&nbsp;/&nbsp;</span>
                <span style="color: #003478; font-weight: 600;">Hoạt động</span>
            </div>

            <!-- Activity Filters -->
            <div class="activity-filters">
                <div class="filter-group">
                    <label for="sort-select">Sắp xếp:</label>
                    <select id="sort-select">
                        <option value="newest">Mới nhất</option>
                        <option value="oldest">Cũ nhất</option>
                    </select>
                </div>
            </div>

            <!-- Activity List -->
            <section class="activity-list-section">
                <div id="activity-container" class="activity-list">
                    <!-- Activity items will be loaded here by JavaScript -->
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...
                    </div>
                </div>
            </section>

            <!-- Pagination -->
            <div id="pagination-container" class="pagination" style="display: none;">
                <!-- Pagination will be generated by JavaScript -->
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../js/common.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/controllers/hoat-dong.js"></script>
    <script>
        // Call the main function to load activities
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader('..', 'hoat-dong');
            loadFooter('..', 'hoat-dong');
            initializeActivityPage();
        });
    </script>
</body>

</html>
