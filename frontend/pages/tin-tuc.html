<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin tức - Học viện Ngân hàng</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages/tin-tuc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/theme.css">
</head>

<body>
    <div class="main-content-wrapper">
        
        <div class="container">
            <!-- News Filters -->
            <div class="news-filters">
                <div class="filter-group">
                    <label for="sort-select">Sắp xếp:</label>
                    <select id="sort-select">
                        <option value="newest">Mới nhất</option>
                        <option value="oldest">Cũ nhất</option>
                    </select>
                </div>
            </div>

            <!-- News List -->
            <section class="news-list-section">
                <div id="news-container" class="news-list">
                    <!-- News items will be loaded here by JavaScript -->
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu...
                    </div>
                </div>
            </section>

            <!-- Pagination -->
            <div id="pagination-container" class="pagination" style="display: none;">
                <!-- Pagination will be generated by JavaScript -->
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="../js/common.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/controllers/tin-tuc.js"></script>
    <script>
        // Call the main function to load news
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader('..', 'tin-tuc');
            loadFooter('..', 'tin-tuc');
            initializeNewsPage();
        });
    </script>
</body>

</html>
